<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Layer Group Selector</title>
<script src="https://components.connect.trimble.com/trimble-connect-workspace-api/index.js"></script>
<style>
  :root {
    --tc-blue: #0069b4;
    --tc-blue-dark: #00548f;
    --border: #dfe3e8;
    --bg: #f7f8f9;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
    font-size: 13px;
    color: #1f2937;
    background: #fff;
  }
  #app { display: flex; flex-direction: column; height: 100vh; }
  .toolbar {
    display: flex;
    gap: 8px;
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    align-items: center;
    background: var(--bg);
  }
  .toolbar h1 { font-size: 14px; margin: 0; flex: 1; font-weight: 600; }
  button {
    font-size: 12px;
    padding: 6px 10px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: #fff;
    cursor: pointer;
  }
  button.primary {
    background: var(--tc-blue);
    color: #fff;
    border-color: var(--tc-blue);
  }
  button.primary:hover { background: var(--tc-blue-dark); }
  button:disabled { opacity: 0.5; cursor: default; }
  button.small { padding: 3px 8px; font-size: 11px; }
  .tabs { display: flex; border-bottom: 1px solid var(--border); }
  .tab {
    padding: 8px 14px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    color: #666;
  }
  .tab.active { border-color: var(--tc-blue); color: var(--tc-blue); font-weight: 600; }
  .panel { flex: 1; overflow-y: auto; }
  .file-header {
    padding: 8px 12px 4px;
    font-size: 11px;
    font-weight: 700;
    color: #6b7280;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    background: var(--bg);
    position: sticky;
    top: 0;
  }
  .layer-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 12px;
    border-bottom: 1px solid #f0f1f2;
  }
  .layer-row:hover { background: #fafbfc; }
  .layer-row label { flex: 1; cursor: pointer; }
  .group-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    border-bottom: 1px solid #f0f1f2;
  }
  .group-name { flex: 1; font-weight: 600; }
  .group-meta { font-size: 11px; color: #888; }
  .group-row.isolated { background: #eef6ff; }
  .empty-state {
    padding: 24px 16px;
    text-align: center;
    color: #888;
  }
  .status-bar {
    padding: 6px 12px;
    font-size: 11px;
    color: #888;
    border-top: 1px solid var(--border);
    background: var(--bg);
  }
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.35);
    display: flex; align-items: center; justify-content: center;
    z-index: 10;
  }
  .modal {
    background: #fff;
    border-radius: 6px;
    padding: 18px;
    width: 320px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.2);
  }
  .modal h2 { font-size: 14px; margin: 0 0 12px; }
  .modal input[type=text] {
    width: 100%;
    padding: 6px 8px;
    border: 1px solid var(--border);
    border-radius: 4px;
    margin-bottom: 12px;
    font-size: 13px;
  }
  .radio-option { display: flex; align-items: flex-start; gap: 6px; margin-bottom: 8px; font-size: 12px; }
  .radio-option small { display: block; color: #888; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 8px; }
  .hint { padding: 8px 12px; font-size: 11px; color: #888; }
</style>
</head>
<body>
<div id="app">
  <div class="toolbar">
    <h1 id="titleText">Layer Group Selector</h1>
    <button id="clearSelectionBtn" class="small">Clear checks</button>
    <button id="createGroupBtn" class="primary" disabled>Group selected layers</button>
  </div>
  <div class="tabs">
    <div class="tab active" data-tab="layers">Layers</div>
    <div class="tab" data-tab="groups">Groups <span id="groupCountBadge"></span></div>
  </div>
  <div class="panel" id="layersPanel"></div>
  <div class="panel" id="groupsPanel" style="display:none"></div>
  <div class="status-bar" id="statusBar">Connecting to Trimble Connect…</div>
</div>

<script>
(function () {
  "use strict";

  // ---- state ----------------------------------------------------------
  var API = null;
  var models = [];                 // [{id, name}]
  var layersByModel = {};           // modelId -> Layer[] ({name, visible})
  var checked = new Set();          // "modelId||layerName"
  var groups = [];                  // {id, name, matchMode: 'name'|'exact', members: [{modelId?, layerName}], isolated, isolateSnapshot}
  var activeTab = "layers";

  var els = {
    titleText: document.getElementById("titleText"),
    clearSelectionBtn: document.getElementById("clearSelectionBtn"),
    createGroupBtn: document.getElementById("createGroupBtn"),
    layersPanel: document.getElementById("layersPanel"),
    groupsPanel: document.getElementById("groupsPanel"),
    statusBar: document.getElementById("statusBar"),
    groupCountBadge: document.getElementById("groupCountBadge"),
  };

  function setStatus(msg) { els.statusBar.textContent = msg; }

  // ---- connect ----------------------------------------------------------
  async function init() {
    try {
      API = await TrimbleConnectWorkspace.connect(window.parent, onEvent, 30000);
      setStatus("Connected. Loading models…");
      await loadModelsAndLayers();
    } catch (err) {
      console.error(err);
      setStatus("Failed to connect to Trimble Connect: " + (err && err.message ? err.message : err));
    }
  }

  function onEvent(event, data) {
    // Reload layer list if models are toggled on/off in the viewer.
    if (event === "viewer.modelStateChanged" || event === "viewer.model.reset") {
      loadModelsAndLayers();
    }
  }

  async function loadModelsAndLayers() {
    models = await API.viewer.getModels("loaded");
    layersByModel = {};
    for (var i = 0; i < models.length; i++) {
      var m = models[i];
      try {
        layersByModel[m.id] = await API.viewer.getLayers(m.id);
      } catch (e) {
        layersByModel[m.id] = [];
      }
    }
    setStatus(models.length + " model(s) loaded, " + countLayers() + " layer entries.");
    renderLayers();
  }

  function countLayers() {
    var n = 0;
    Object.keys(layersByModel).forEach(function (k) { n += layersByModel[k].length; });
    return n;
  }

  // ---- rendering: layers tab ---------------------------------------------
  function renderLayers() {
    var html = "";
    if (models.length === 0) {
      html = '<div class="empty-state">No models loaded in the viewer yet.</div>';
    }
    models.forEach(function (m) {
      var layers = layersByModel[m.id] || [];
      if (layers.length === 0) return;
      html += '<div class="file-header">' + escapeHtml(m.name || m.id) + "</div>";
      layers.forEach(function (layer) {
        var key = m.id + "||" + layer.name;
        var isChecked = checked.has(key);
        html +=
          '<div class="layer-row">' +
          '<input type="checkbox" data-key="' + escapeAttr(key) + '" ' + (isChecked ? "checked" : "") + " />" +
          '<label data-key="' + escapeAttr(key) + '">' + escapeHtml(layer.name) + "</label>" +
          "</div>";
      });
    });
    els.layersPanel.innerHTML = html;
    Array.prototype.forEach.call(els.layersPanel.querySelectorAll("input[type=checkbox]"), function (cb) {
      cb.addEventListener("change", function () {
        var key = cb.getAttribute("data-key");
        if (cb.checked) checked.add(key); else checked.delete(key);
        updateToolbarState();
      });
    });
    Array.prototype.forEach.call(els.layersPanel.querySelectorAll("label[data-key]"), function (lbl) {
      lbl.addEventListener("click", function () {
        var key = lbl.getAttribute("data-key");
        var cb = els.layersPanel.querySelector('input[data-key="' + cssEscape(key) + '"]');
        cb.checked = !cb.checked;
        cb.dispatchEvent(new Event("change"));
      });
    });
    updateToolbarState();
  }

  function updateToolbarState() {
    els.createGroupBtn.disabled = checked.size === 0;
  }

  els.clearSelectionBtn.addEventListener("click", function () {
    checked.clear();
    renderLayers();
  });

  // ---- create group modal -------------------------------------------------
  els.createGroupBtn.addEventListener("click", openCreateGroupModal);

  function openCreateGroupModal() {
    var selectedEntries = Array.from(checked).map(function (key) {
      var idx = key.indexOf("||");
      return { modelId: key.substring(0, idx), layerName: key.substring(idx + 2) };
    });
    var uniqueNames = Array.from(new Set(selectedEntries.map(function (e) { return e.layerName; })));

    var backdrop = document.createElement("div");
    backdrop.className = "modal-backdrop";
    backdrop.innerHTML =
      '<div class="modal">' +
      "<h2>New layer group</h2>" +
      '<input type="text" id="groupNameInput" placeholder="Group name" />' +
      '<div class="radio-option">' +
      '<input type="radio" name="matchMode" id="modeName" value="name" checked />' +
      '<label for="modeName">Match by layer name, across every loaded file' +
      "<small>Selects this layer name in ALL models, not just the ones you checked.</small></label>" +
      "</div>" +
      '<div class="radio-option">' +
      '<input type="radio" name="matchMode" id="modeExact" value="exact" />' +
      '<label for="modeExact">Only the exact file + layer pairs I checked' +
      "<small>" + selectedEntries.length + " pair(s) selected (" + uniqueNames.join(", ") + ")</small></label>" +
      "</div>" +
      '<div class="modal-actions">' +
      '<button id="cancelGroupBtn">Cancel</button>' +
      '<button id="saveGroupBtn" class="primary">Create</button>' +
      "</div>" +
      "</div>";
    document.body.appendChild(backdrop);

    document.getElementById("cancelGroupBtn").addEventListener("click", function () {
      document.body.removeChild(backdrop);
    });
    document.getElementById("saveGroupBtn").addEventListener("click", function () {
      var name = document.getElementById("groupNameInput").value.trim();
      if (!name) { document.getElementById("groupNameInput").focus(); return; }
      var mode = document.querySelector('input[name="matchMode"]:checked').value;
      var members = mode === "name"
        ? uniqueNames.map(function (n) { return { layerName: n }; })
        : selectedEntries;
      groups.push({
        id: "g" + Date.now() + Math.random().toString(36).slice(2, 6),
        name: name,
        matchMode: mode,
        members: members,
        isolated: false,
        isolateSnapshot: null,
      });
      checked.clear();
      document.body.removeChild(backdrop);
      renderLayers();
      renderGroups();
      switchTab("groups");
    });
  }

  // ---- rendering: groups tab ----------------------------------------------
  function renderGroups() {
    els.groupCountBadge.textContent = groups.length ? "(" + groups.length + ")" : "";
    if (groups.length === 0) {
      els.groupsPanel.innerHTML = '<div class="empty-state">No groups yet. Check some layers on the Layers tab, then click "Group selected layers".</div>';
      return;
    }
    var html = "";
    groups.forEach(function (g) {
      html +=
        '<div class="group-row' + (g.isolated ? " isolated" : "") + '" data-id="' + g.id + '">' +
        '<div>' +
        '<div class="group-name">' + escapeHtml(g.name) + "</div>" +
        '<div class="group-meta">' + describeGroup(g) + "</div>" +
        "</div>" +
        '<button class="small select-btn" data-id="' + g.id + '">Select</button>' +
        '<button class="small isolate-btn" data-id="' + g.id + '">' + (g.isolated ? "Un-isolate" : "Isolate") + "</button>" +
        '<button class="small remove-btn" data-id="' + g.id + '">✕</button>' +
        "</div>";
    });
    els.groupsPanel.innerHTML = html;
    bindGroupButtons();
  }

  function describeGroup(g) {
    if (g.matchMode === "name") {
      return "By name, all files: " + g.members.map(function (m) { return m.layerName; }).join(", ");
    }
    return g.members.length + " specific file+layer pair(s)";
  }

  function bindGroupButtons() {
    Array.prototype.forEach.call(els.groupsPanel.querySelectorAll(".select-btn"), function (btn) {
      btn.addEventListener("click", function () { selectGroup(findGroup(btn.getAttribute("data-id"))); });
    });
    Array.prototype.forEach.call(els.groupsPanel.querySelectorAll(".isolate-btn"), function (btn) {
      btn.addEventListener("click", function () { toggleIsolateGroup(findGroup(btn.getAttribute("data-id"))); });
    });
    Array.prototype.forEach.call(els.groupsPanel.querySelectorAll(".remove-btn"), function (btn) {
      btn.addEventListener("click", function () {
        var g = findGroup(btn.getAttribute("data-id"));
        if (g && g.isolated) restoreVisibilitySnapshot(g);
        groups = groups.filter(function (x) { return x.id !== btn.getAttribute("data-id"); });
        renderGroups();
      });
    });
  }

  function findGroup(id) {
    return groups.filter(function (g) { return g.id === id; })[0];
  }

  // ---- resolving group members to runtime object ids ----------------------
  // The Workspace API has no direct "objects in this layer" selector, so we
  // briefly show only the target layer(s), read back what's visible via
  // getObjects(..., {visible:true}), then restore the original layer
  // visibility. This happens per affected model.
  async function resolveGroupObjects(g) {
    var modelIdsInvolved = g.matchMode === "name"
      ? models.map(function (m) { return m.id; })
      : Array.from(new Set(g.members.map(function (m) { return m.modelId; })));

    var result = []; // [{id: modelId, objects: [runtimeIds]}]

    for (var i = 0; i < modelIdsInvolved.length; i++) {
      var modelId = modelIdsInvolved[i];
      var allLayers = layersByModel[modelId] || [];
      if (allLayers.length === 0) continue;

      var targetNames = g.matchMode === "name"
        ? g.members.map(function (m) { return m.layerName; })
        : g.members.filter(function (m) { return m.modelId === modelId; }).map(function (m) { return m.layerName; });
      if (targetNames.length === 0) continue;

      var originalVisibility = allLayers.map(function (l) { return { name: l.name, visible: l.visible }; });
      var toggled = allLayers.map(function (l) {
        return { name: l.name, visible: targetNames.indexOf(l.name) !== -1 };
      });

      await API.viewer.setLayersVisibility(modelId, toggled);
      var visibleObjs = await API.viewer.getObjects(undefined, { visible: true });
      var forThisModel = visibleObjs.filter(function (mo) { return mo.modelId === modelId || mo.id === modelId; })[0];
      var runtimeIds = forThisModel ? (forThisModel.objects || []).map(function (o) { return o.id !== undefined ? o.id : o; }) : [];

      await API.viewer.setLayersVisibility(modelId, originalVisibility);

      if (runtimeIds.length) result.push({ modelId: modelId, objects: runtimeIds });
    }
    return result;
  }

  async function selectGroup(g) {
    if (!g) return;
    setStatus('Resolving objects for "' + g.name + '"…');
    var resolved = await resolveGroupObjects(g);
    var modelObjectIds = resolved.map(function (r) { return { modelId: r.modelId, objectRuntimeIds: r.objects }; });
    await API.viewer.setSelection({ modelObjectIds: modelObjectIds }, "set");
    var total = resolved.reduce(function (sum, r) { return sum + r.objects.length; }, 0);
    setStatus('Selected ' + total + ' object(s) in group "' + g.name + '".');
  }

  async function toggleIsolateGroup(g) {
    if (!g) return;
    if (g.isolated) {
      restoreVisibilitySnapshot(g);
      g.isolated = false;
      renderGroups();
      setStatus('Un-isolated "' + g.name + '".');
      return;
    }
    setStatus('Isolating "' + g.name + '"…');
    // Snapshot current visibility of every loaded model's layers so we can restore it later.
    g.isolateSnapshot = models.map(function (m) {
      return { modelId: m.id, layers: (layersByModel[m.id] || []).map(function (l) { return { name: l.name, visible: l.visible }; }) };
    });
    var resolved = await resolveGroupObjects(g);
    var modelEntities = resolved.map(function (r) { return { modelId: r.modelId, objectRuntimeIds: r.objects }; });
    await API.viewer.isolateEntities(modelEntities);
    g.isolated = true;
    renderGroups();
    setStatus('Isolated "' + g.name + '".');
  }

  async function restoreVisibilitySnapshot(g) {
    if (!g.isolateSnapshot) { await API.viewer.reset(); return; }
    for (var i = 0; i < g.isolateSnapshot.length; i++) {
      var snap = g.isolateSnapshot[i];
      await API.viewer.setLayersVisibility(snap.modelId, snap.layers);
    }
    g.isolateSnapshot = null;
  }

  // ---- tabs ---------------------------------------------------------------
  Array.prototype.forEach.call(document.querySelectorAll(".tab"), function (tab) {
    tab.addEventListener("click", function () { switchTab(tab.getAttribute("data-tab")); });
  });

  function switchTab(name) {
    activeTab = name;
    Array.prototype.forEach.call(document.querySelectorAll(".tab"), function (t) {
      t.classList.toggle("active", t.getAttribute("data-tab") === name);
    });
    els.layersPanel.style.display = name === "layers" ? "" : "none";
    els.groupsPanel.style.display = name === "groups" ? "" : "none";
    if (name === "groups") renderGroups();
  }

  // ---- tiny helpers ---------------------------------------------------------
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
    });
  }
  function escapeAttr(s) { return escapeHtml(s); }
  function cssEscape(s) {
    return String(s).replace(/["\\]/g, "\\$&");
  }

  init();
})();
</script>
</body>
</html>
